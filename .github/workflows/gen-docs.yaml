name: Regenerate docs for PR

on:
  pull_request:
    branches:
      - main
    paths:
      - 'charts/**'
      - '.github/workflows/gen-docs.yaml'
      - '.pre-commit-config.yaml'

concurrency:
  group: gen-docs-${{ github.event.pull_request.number || github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  gen-docs:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
      - name: Install helm-docs
        run: go install github.com/norwoodj/helm-docs/cmd/helm-docs@v1.14.2
        env:
          GOBIN: /usr/local/bin/
      - name: (Re-)Generate helm-docs
        run: . charts/.helm-docs/generate-cli.sh
        env:
          GOBIN: /usr/local/bin/

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

      - name: Commit and push docs to PR
        run: |
            git add charts/*/README.md
            if ! git diff-index --quiet HEAD; then
              git commit -m "Update helm-docs"
              git push origin HEAD:${{ github.head_ref }}
            fi
