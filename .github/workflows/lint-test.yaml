name: Lint and Test Charts

on:
  pull_request:
    branches:
      - main
    paths:
      - 'charts/**'
      - '.github/scripts/**'
      - '.github/workflows/lint-test.yaml'
      - '.pre-commit-config.yaml'
  push:
    branches:
      - main
    paths:
      - 'charts/**'
      - '.github/scripts/**'
      - '.github/workflows/lint-test.yaml'
      - '.pre-commit-config.yaml'

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0

      - name: Set up python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.x'
          check-latest: true

      - name: Install helm-docs
        run: go install github.com/norwoodj/helm-docs/cmd/helm-docs@v1.14.2
        env:
          GOBIN: /usr/local/bin/

      - name: Run pre-commit
        uses: pre-commit/action@v3.0.1

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Run chart-testing (list-changed)
        id: list-changed
        run: |
          changed=$(ct list-changed --target-branch ${{ github.event.repository.default_branch }})
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            {
              echo "charts<<EOF"
              echo "$changed"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Validate Helm dependencies
        if: steps.list-changed.outputs.changed == 'true'
        env:
          CHANGED_CHARTS: ${{ steps.list-changed.outputs.charts }}
        run: |
          mapfile -t charts <<< "$CHANGED_CHARTS"
          bash .github/scripts/validate-helm-dependencies.sh "${charts[@]}"

      - name: Run chart-testing (lint)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --target-branch ${{ github.event.repository.default_branch }}

      - name: Create kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1.14.0

      - name: Run chart-testing (install)
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --target-branch ${{ github.event.repository.default_branch }}
