name: Release Charts

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
      - '.gh-pages/**'
      - '.github/scripts/**'
      - '.github/workflows/release.yaml'

concurrency:
  group: release-charts-main
  cancel-in-progress: false

jobs:
  release:
    outputs:
      has_changes: ${{ steps.package_charts.outputs.has_changes }}
      changed_charts: ${{ steps.package_charts.outputs.changed_charts }}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0

      - name: Package changed charts
        id: package_charts
        run: bash .github/scripts/package-release-charts.sh

      - name: Install chart-releaser
        if: steps.package_charts.outputs.has_changes == 'true'
        uses: helm/chart-releaser-action@v1.7.0
        with:
          install_only: true

      - name: Publish chart releases
        if: steps.package_charts.outputs.has_changes == 'true'
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: |
          owner=$(cut -d '/' -f 1 <<< "$GITHUB_REPOSITORY")
          repo=$(cut -d '/' -f 2 <<< "$GITHUB_REPOSITORY")

          rm -rf .cr-index
          mkdir -p .cr-index

          cr upload -o "$owner" -r "$repo" -c "$(git rev-parse HEAD)" --skip-existing --pages-branch gh-pages
          cr index -o "$owner" -r "$repo" --push --pages-branch gh-pages

  update-readme:
    needs: release
    if: needs.release.outputs.has_changes == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch into main
        uses: actions/checkout@v6
        with:
          ref: main
          path: main

      - name: Checkout gh-pages branch into gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages

      - name: Extract Helm Charts
        id: extract_chart_entries
        uses: mikefarah/yq@v4.52.4
        with:
            cmd: cat gh-pages/index.yaml | yq -o=json eval '.entries | to_entries'

      - name: Generate README.md
        run: |
            helm_charts='${{ steps.extract_chart_entries.outputs.result }}'
            table="| Name | Version | AppVersion | Description |\n|------|---------|------------|-------------|\n"
            while IFS= read -r chart; do
                value=$(echo "$chart" | jq '.value[0]')
                name=$(echo $value | jq -r '.name')
                version=$(echo $value | jq -r '.version')
                appVersion=$(echo $value | jq -r '.appVersion')
                description=$(echo $value | jq -r '.description')
                table+="| ${name} | ${version} | ${appVersion} | ${description} |\n"
            done < <(echo "$helm_charts" | jq -c '.[]')
            echo -e "$(cat main/${CA_GHR_HEADER_TMPL})\n\n${table}" > gh-pages/README.md
        env:
            CA_GHR_HEADER_TMPL: ".gh-pages/templates/README.md"

      - name: Commit and push README.md to gh-pages
        run: |
            cd gh-pages
            git config user.name "$GITHUB_ACTOR"
            git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
            git add README.md
            if ! git diff-index --quiet HEAD; then
              git commit -m "Update README.md with latest Helm charts"
              git push origin gh-pages
            fi
